<!-- القائمة العلوية مع نظام تسجيل الدخول -->
<nav class="bg-white shadow p-4 flex justify-between px-10 items-center">
    <h1 class="text-2xl font-bold">متجر الفخامة</h1>
    <div id="auth-box">
        <input type="email" id="email" placeholder="البريد" class="border p-1 rounded text-sm">
        <input type="password" id="pass" placeholder="كلمة المرور" class="border p-1 rounded text-sm">
        <button onclick="login()" class="bg-black text-white px-4 py-2 rounded text-sm">دخول</button>
    </div>
</nav>

<!-- لوحة التحكم (لن تظهر إلا للمدير) -->
<div id="adminPanel" class="hidden bg-gray-100 p-6 m-10 rounded-xl border-2 border-dashed border-black">
    <h2 class="font-bold text-lg mb-4">لوحة تحكم المدير:</h2>
    <input type="text" id="pName" placeholder="اسم الحذاء" class="p-2 border rounded">
    <input type="number" id="pPrice" placeholder="السعر" class="p-2 border rounded">
    <input type="text" id="pImg" placeholder="رابط الصورة" class="p-2 border rounded">
    <button onclick="addProduct()" class="bg-green-600 text-white px-6 py-2 rounded">إضافة منتج</button>
    <p class="text-xs mt-2">* أي تعديل هنا سيظهر فوراً للزوار.</p>
</div>

<script>
    // عند تسجيل الدخول
    function login() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        firebase.auth().signInWithEmailAndPassword(email, pass)
            .then(() => alert("مرحباً بك يا مدير"))
            .catch(err => alert("خطأ: " + err.message));
    }

    // مراقبة الصلاحيات (إظهار اللوحة فقط للمدير)
    firebase.auth().onAuthStateChanged(user => {
        if (user && user.email === "bood68155@gmail.com") {
            document.getElementById('adminPanel').classList.remove('hidden');
            document.getElementById('auth-box').innerHTML = "<span>أهلاً مدير المتجر</span>";
        }
    });

    // إضافة منتج
    function addProduct() {
        firebase.database().ref('products/').push({
            name: document.getElementById('pName').value,
            price: document.getElementById('pPrice').value,
            img: document.getElementById('pImg').value
        }).then(() => alert("تمت إضافة المنتج!"));
    }
</script>
